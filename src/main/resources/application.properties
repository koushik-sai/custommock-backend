spring.application.name=custommock-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/custommock
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT settings
jwt.secret=please-change-me-in-production
jwt.expirationMs=86400000

# OTP settings
otp.expiration.minutes=5
otp.resend.cooldown.seconds=60

# SMTP (Gmail) - set password securely via environment or external config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=koushiksai8564@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true